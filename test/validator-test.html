<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>validator.js — Unit &amp; Property Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #f9f9f9; }
    h1   { font-size: 1.4rem; }
    #summary { margin: 1rem 0; font-weight: bold; font-size: 1.1rem; }
    ul   { list-style: none; padding: 0; }
    li   { padding: .25rem .5rem; margin: .2rem 0; border-radius: 4px; font-size: .9rem; font-family: monospace; }
    .ok   { background: #d4edda; color: #155724; }
    .fail { background: #f8d7da; color: #721c24; }
    .detail { font-size: .8rem; opacity: .8; margin-left: 1rem; }
  </style>
</head>
<body>
  <h1>validator.js Tests</h1>
  <div id="summary">Loading…</div>
  <ul id="results"></ul>

  <!-- fast-check via CDN (property-based testing) -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check@3/lib/bundle/fast-check.min.js"></script>

  <script type="module">
    // Import the test module — fc is already on window from the CDN script above
    const { results, passed, failed } = await import('../js/validator.test.js');

    const ul  = document.getElementById('results');
    const sum = document.getElementById('summary');

    for (const r of results) {
      const li = document.createElement('li');
      li.className = r.ok ? 'ok' : 'fail';
      li.textContent = (r.ok ? '✓ ' : '✗ ') + r.label;
      if (!r.ok && r.detail) {
        const small = document.createElement('div');
        small.className = 'detail';
        small.textContent = r.detail;
        li.appendChild(small);
      }
      ul.appendChild(li);
    }

    sum.textContent = `${passed} passed, ${failed} failed`;
    sum.style.color = failed === 0 ? '#155724' : '#721c24';
  </script>
</body>
</html>
